<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Series</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h2>Series de TV</h2>

  <div class="row">
    
    <!-- TABLA -->
    <div class="col-md-6">
      
      <table class="table table-striped">
        <thead class="thead-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Channel</th>
            <th>Seasons</th>
          </tr>
        </thead>
        <tbody id="series-table-body"></tbody>
      </table>

      <!-- PROMEDIO -->
      <div class="mt-3">
        <strong id="average-seasons"></strong>
      </div>

    </div>

    <!-- DETALLE -->
    <div class="col-md-6">
      <h4>Detalle de la serie</h4>
      <div id="serie-detail" class="mt-3"></div>
    </div>

  </div>
</div>

<script type="module" src="./Main.js"></script>

</body>
</html>
